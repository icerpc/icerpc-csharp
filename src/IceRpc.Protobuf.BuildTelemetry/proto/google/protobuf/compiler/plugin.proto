// This file is a vendored stub of the upstream google/protobuf/compiler/plugin.proto. It declares only the
// `Version` message, which is the single type we import. The file name, package, csharp_namespace, and message
// definition deliberately match upstream so that:
//   - protoc resolves `google.protobuf.compiler.Version` when compiling protobuf_build_telemetry.proto, and
//   - the descriptor generated for protobuf_build_telemetry.proto references the dependency by the canonical
//     name `google/protobuf/compiler/plugin.proto` and the C# class `Google.Protobuf.Compiler.PluginReflection`,
//     both of which are already provided at runtime by Google.Protobuf.dll.
//
// This file is import-only: C# generation for it is suppressed in IceRpc.Protobuf.BuildTelemetry.csproj.
//
// TODO: Remove this file if/when the protoc distribution we use includes plugin.proto.

syntax = "proto2";

package google.protobuf.compiler;
option csharp_namespace = "Google.Protobuf.Compiler";

// The version number of protocol compiler.
message Version {
    optional int32 major = 1;
    optional int32 minor = 2;
    optional int32 patch = 3;
    // A suffix for alpha, beta or rc release, e.g., "alpha-1", "rc2". It should
    // be empty for mainline stable releases.
    optional string suffix = 4;
}
