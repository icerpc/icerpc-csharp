version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "Microsoft.CodeAnalysis.CSharp"
    groups:
      nuget:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directories: ["/", "/.github/actions/*"]
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]
