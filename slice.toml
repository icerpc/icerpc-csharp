# slice.toml — provenance for vendored Slice files
#
# Each [source.<name>] section describes an upstream repository and which files to
# vendor into this repo.  Run `python tools/sync-slice.py` to synchronize.

[source.ice]
repo    = "https://github.com/zeroc-ice/ice"
rev     = "03cea02ef05465a383aae353563252b9a648b6e6"
source  = "slice"
dest    = "slice"
include = ["Ice/Identity.ice", "Ice/Locator.ice", "Ice/LocatorRegistry.ice", "Ice/OperationMode.ice", "Ice/Process.ice", "Ice/ReplyStatus.ice"]

[source.icerpc]
repo    = "https://github.com/icerpc/icerpc-slice"
rev     = "1a64ab5d6b3bde7bcadf151fbb1c5ab4f32f3548"
dest    = "slice"
include = ["**/*.slice", "**/*.ice"]

[source.compiler]
repo    = "https://github.com/icerpc/slicec"
rev     = "8dba35bbbcaabbf7c5cb2d93479acbabb349a2bc"
source  = "slice"
dest    = "slice"
include = ["**/*.slice"]
