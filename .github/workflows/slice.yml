name: "Verify vendored Slice files"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify-vendored-files:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify Slice files match slice.toml
        run: python build/sync-slice.py --verify
