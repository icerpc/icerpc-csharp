name: "Verify vendored Slice files"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify-vendored-files:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify Slice files match slice.toml
        run: python build/sync-slice.py --verify
