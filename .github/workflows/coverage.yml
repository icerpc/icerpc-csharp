name: coverage

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
      - name: Build
        run: dotnet build
        shell: bash

      - name: Generate Coverage Reports
        run: dotnet test --collect:"XPlat Code Coverage"
        shell: bash

      - name: Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          files: tests/*/TestResults/*/coverage.cobertura.xml
          format: cobertura

      - name: ReportGenerator
        uses: danielpalme/ReportGenerator-GitHub-Action@049f7ec958c672fd31d5cc1cb01622dc8d2e23ab # v5.5.10
        with:
          reports: tests/*/TestResults/*/coverage.cobertura.xml
          targetdir: coveragereport
          reporttypes: Html;Badges
          license: ${{ secrets.REPORT_GENERATOR_LICENSE }}

      - name: Sync Coverage Report to S3
        if: github.repository == 'icerpc/icerpc-csharp' && github.event_name == 'push'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 sync ./coveragereport s3://${{ secrets.AWS_S3_BUCKET }}/csharp/${{ github.ref_name }}/coverage \
            --delete --cache-control "no-cache, no-store"
