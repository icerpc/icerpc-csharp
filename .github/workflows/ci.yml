name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# See https://docs.github.com/en/actions/using-jobs/using-concurrency#example-using-a-fallback-value
concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  # Debug and dry-run for build telemetry. Keep IceRpcBuildTelemetry as is.
  IceRpcBuildTelemetryDebug: true
  IceRpcBuildTelemetryDryRun: true

jobs:
  build_and_test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26, windows-2025-vs2026]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Dump System Information
        if: runner.os != 'Windows'
        shell: bash
        run: ulimit -a
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
      - name: Build
        run: dotnet build
        shell: bash
      - name: Publish Local Packages
        run: ./build/publish-local-packages.sh
        shell: bash
      - name: Run Tests
        uses: ./.github/actions/test
      - name: Install Templates
        run: dotnet new install src/IceRpc.Templates/bin/Debug/IceRpc.Templates.*.nupkg
        shell: bash
      - name: Test Templates
        uses: ./.github/actions/test-templates

      - name: Build Examples
        env:
          # Set IceRpcVersion to use the locally built packages
          IceRpcVersion: "0.7.0-preview.1"
        run: |
          for solution in examples/*/*/*.slnx; do dotnet build "$solution"; done
        shell: bash
      - name: Build DocFX Examples
        run: dotnet build docfx/examples/Examples.slnx
        shell: bash
